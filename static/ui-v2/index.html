<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ANDIE Operator Console v2</title>
  <link rel="icon" type="image/svg+xml" href="/static/ui-v2/favicon.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <!-- TOP BAR -->
    <div class="topbar">
      <div class="logo">ANDIE</div>
      <div class="status">
        <span class="dot online"></span> CORE ONLINE
      </div>
      <div class="mode-toggle" onclick="toggleDevMode()">NORMAL</div>
    </div>
    <!-- MAIN -->
    <div class="main">
      <!-- LEFT: SYSTEM PANEL -->
      <div class="left-panel">
        <div class="status-block">
          <div class="label">SYSTEM</div>
          <div class="value online">ONLINE</div>
        </div>
        <div class="card">
          <div class="card-title">Active Agent</div>
          <select id="agent-select">
            <option value="Alpha">Alpha</option>
            <option value="Beta">Beta</option>
            <option value="Gamma">Gamma</option>
          </select>
          <div id="active-agent">Alpha</div>
        </div>
        <!-- AGENT CONTROLS -->
        <div class="card" id="agent-controls">
          <div class="card-title">Cryptonia Controls</div>
          <div>Status: <span id="cryptonia-status">Unknown</span></div>
          <button id="cryptonia-start">Start Cryptonia</button>
          <button id="cryptonia-stop">Stop Cryptonia</button>
        </div>
        <div class="card dev-only hidden" id="debug-panel">
          <div class="card-title">Debug</div>
          <pre id="debug-log"></pre>
        </div>
      </div>
      <!-- CENTER: CHAT + COGNITION -->
      <div class="center-panel">
        <!-- THINKING STATE -->
        <div id="cognition-bar" class="cognition-bar">🧠 Idle</div>
        <!-- CHAT / OUTPUT -->
        <div id="chat-output" class="chat-output"></div>
      </div>
      <!-- RIGHT: ACTIVITY + MEMORY -->
      <div class="right-panel">
        <div class="card">
          <div class="card-title">Activity</div>
          <div id="activity-feed"></div>
        </div>
        <div class="card">
          <div class="card-title">Memory</div>
          <div id="memory-view"></div>
        </div>
      </div>
    </div>
    <!-- INPUT -->
    <div class="input-bar">
      <input id="user-input" placeholder="Enter directive..." />
      <button onclick="sendMessage()">SEND</button>
    </div>
  </div>
  <script src="ui.js"></script>
  <!-- ORB + SCAN BUTTON (PHASE 1 DEMO) -->
  <div style="position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 1000; display: flex; flex-direction: column; align-items: center; gap: 16px;">
    <div class="orb" style="width: 64px; height: 64px; border-radius: 50%; background: linear-gradient(135deg, #6ee7b7 0%, #3b82f6 100%); box-shadow: 0 2px 16px #0002; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: box-shadow 0.2s; border: 3px solid #fff;"></div>
    <button id="run-scan" style="padding: 8px 20px; border-radius: 20px; border: none; background: #3b82f6; color: #fff; font-weight: bold; cursor: pointer; box-shadow: 0 1px 4px #0001;">Run Security Scan</button>
  </div>
  <script src="app.js"></script>
</body>
</html>
