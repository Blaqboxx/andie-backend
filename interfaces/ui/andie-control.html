<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANDIE // Neural Ops Console</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&family=Orbitron:wght@400;700;900&display=swap');

  :root {
    --phosphor: #00e0ff;
    --phosphor-dim: #0090ff;
    --phosphor-fade: rgba(0,224,255,0.10);
    --phosphor-glow: rgba(0,224,255,0.45);
    --phosphor-trace: rgba(0,224,255,0.07);
    --bg-deep: #01010a;
    --bg-panel: #0a0a18;
    --bg-card: #111122;
    --scanline: rgba(0,224,255,0.04);
    --warn: #ffcc00;
    --danger: #ff3b30;
    --cyan: #00e0ff;
    --border: rgba(0,224,255,0.18);
  }


  html, body {
    height: 100vh;
    min-height: 100vh;
    max-height: 100vh;
    width: 100vw;
    min-width: 100vw;
    max-width: 100vw;
    margin: 0;
    padding: 0;
    overflow: hidden;
    position: relative;
    background: var(--bg-deep);
    color: var(--phosphor);
    font-family: 'Share Tech Mono', monospace;
    text-shadow: 0 0 8px var(--phosphor-glow), 0 0 2px var(--phosphor);
  }

  .console, .panel-left, .panel-center, .panel-right {
    min-height: 0;
  }

  .chat-panel {
    display: flex;
    flex-direction: column;
    height: 100%;
    min-height: 0;
  }

  .chat-messages {
    flex: 1 1 0%;
    min-height: 0;
    max-height: 100%;
    overflow-y: auto;
  }
