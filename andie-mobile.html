<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ANDIE Mobile</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #181c20;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 1rem;
      background: #23272b;
      text-align: center;
      font-size: 1.3rem;
      font-weight: bold;
      letter-spacing: 1px;
    }
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 1rem;
    }
    .orb {
      width: 80px;
      height: 80px;
      background: radial-gradient(circle at 30% 30%, #00eaff 70%, #005a7a 100%);
      border-radius: 50%;
      box-shadow: 0 0 24px #00eaff99;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      margin: 2rem 0 1rem 0;
      cursor: pointer;
      transition: box-shadow 0.2s;
    }
    .orb:active {
      box-shadow: 0 0 40px #00eaffcc;
    }
    .status, .suggestions, .output {
      width: 100%;
      max-width: 400px;
      margin: 1rem auto;
      background: #23272b;
      border-radius: 12px;
      padding: 1rem;
      box-sizing: border-box;
    }
    .suggestions button {
      background: #00eaff;
      color: #181c20;
      border: none;
      border-radius: 8px;
      margin: 0.25rem 0.5rem 0.25rem 0;
      padding: 0.5rem 1rem;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .suggestions button:active {
      background: #0099b3;
    }
    .output {
      min-height: 60px;
      font-size: 1.1rem;
      word-break: break-word;
    }
    @media (max-width: 600px) {
      .main, .status, .suggestions, .output {
        padding: 0.5rem;
      }
      .orb {
        width: 60px;
        height: 60px;
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>
  <header>ANDIE &mdash; Autonomous Intelligence Environment</header>
  <div class="main">
    <div class="status" id="status">System: <span id="system-status">Loading...</span></div>
    <div class="orb" id="chat-orb" title="Tap to chat or speak">💬</div>
    <div class="suggestions">
      <div>Try saying:</div>
      <button onclick="sendPrompt('Check system status')">Check system status</button>
      <button onclick="sendPrompt('List all agents')">List all agents</button>
      <button onclick="sendPrompt('Run security scan')">Run security scan</button>
      <button onclick="sendPrompt('Show my tasks')">Show my tasks</button>
      <button onclick="sendPrompt('What am I looking at?')">What am I looking at?</button>
    </div>
    <div class="output" id="chat-output"></div>
    <div class="status" id="tasks-panel">
      <b>Tasks & Dependencies</b>
      <ul id="tasks-list" style="padding-left:1.2em;"></ul>
    </div>
  </div>
  <script>
    // Fetch system status
    async function fetchStatus() {
      try {
        const res = await fetch('/status');
        const data = await res.json();
        document.getElementById('system-status').innerText = data.status || 'Online';
      } catch {
        document.getElementById('system-status').innerText = 'Offline';
      }
    }
    fetchStatus();
    setInterval(fetchStatus, 5000);

    // WebSocket chat wiring
    let ws;
    function connectWS() {
      ws = new WebSocket('ws://' + location.hostname + ':8000/ws/chat');
      ws.onopen = () => appendOutput('[ANDIE is ready]');
      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        if (msg.type === 'CHAT_STREAM') appendOutput(msg.chunk);
        if (msg.type === 'SENTINEL_ALERT') appendOutput('[SENTINEL] ' + msg.message);
      };
      ws.onclose = () => appendOutput('[Chat disconnected]');
    }
    connectWS();

    function appendOutput(text) {
      const out = document.getElementById('chat-output');
      out.innerHTML += text + '<br>';
      out.scrollTop = out.scrollHeight;
    }

    // Chat orb click: prompt for text (voice can be added later)
    document.getElementById('chat-orb').onclick = async function() {
      const msg = prompt('Type your message for ANDIE:');
      if (msg) sendPrompt(msg);
    };

    function sendPrompt(text) {
      if (ws && ws.readyState === 1) {
        ws.send(JSON.stringify({type: 'CHAT', message: text}));
        appendOutput('<b>You:</b> ' + text);
      } else {
        appendOutput('[Chat not connected]');
      }
    }
    // Fetch and display tasks/DAG
    async function fetchTasks() {
      try {
        const res = await fetch('/tasks');
        const tasks = await res.json();
        const list = document.getElementById('tasks-list');
        list.innerHTML = '';
        for (const t of tasks) {
          const deps = t.dependencies.length ? `→ [${t.dependencies.join(', ')}]` : '';
          const done = t.completed ? '✅' : '⏳';
          list.innerHTML += `<li>${done} <b>${t.description}</b> <small>(priority ${t.priority})</small> <span style='color:#00eaff;'>${deps}</span></li>`;
        }
      } catch {
        document.getElementById('tasks-list').innerHTML = '<li>Could not load tasks.</li>';
      }
    }
    fetchTasks();
    setInterval(fetchTasks, 4000);
  </script>
</body>
</html>
