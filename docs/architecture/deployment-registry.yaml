unknowns:
  - qdrant_location
  - redis_location
  - mission_control_host
  - sentinel_host
  - llm_runtime_host

verification_rules:
  - do_not_promote_best_known_to_verified_without_node_confirmation
  - treat_storage_as_persistence_not_compute
  - treat_blaqtower2_as_authoritative_core_until_proven_otherwise
