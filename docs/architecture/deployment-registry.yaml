verified_physical_topology:
  hostname: Blaqtower2
  os: Ubuntu 26.04 LTS
  kernel: 7.0.0-15-generic
  active_ssd: ~100GB
  hdd_storage:
    shared: 1.9TB
    archive: 3.6TB

operational_topology:
  gpu_pc:
    role: inference
    responsibilities:
      - llm_inference
      - embeddings
      - vision_models
      - future_fine_tuning
  nuc2:
    role: valhalla_core
    responsibilities:
      - executive
      - identity
      - governance
      - agenda
      - scheduler
      - mission_control
      - a2a_router
  nuc1:
    hostname: Blaqtower
    aliases:
      - Blaqtower1
      - NUC 1
    role: institutions
    responsibilities:
      - sentinel
      - workshop
      - academy
      - monitoring
      - mcp_services
  storage_layer:
    role: persistence
    responsibilities:
      - runtime_state
      - operational_data
      - archives
      - backups

registry:
  blaqtower2:
    role: valhalla_core
    confidence: medium
    verification_status: needs_node_level_confirmation
    inventory_file: ../inventory/blaqtower2.md
